# Server Configuration
server.port=8082

# Application Name
spring.application.name=booking-payment-service

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/bookingdb

# Downstream service endpoints
services.event.base-url=http://localhost:8083/events
services.notification.base-url=http://localhost:8089/notify

# Logging
logging.level.org.springframework.data.mongodb=DEBUG
